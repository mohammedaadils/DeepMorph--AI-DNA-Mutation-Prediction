<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepMorph AI — Login</title>
    <meta name="description" content="DeepMorph AI Genomic Analysis Platform — Clinical Practitioner Login">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <canvas id="dna-canvas"></canvas>

    <div class="login-container">
        <div class="login-card glass-card">
            <div class="login-logo">
                <div class="logo-helix">🧬</div>
                <h1>DeepMorph <span class="version-badge">AI</span></h1>
                <p class="login-subtitle">Genomic Analysis Platform</p>
            </div>

            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="clinician@deepmorph.com" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-row">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="remember-me">
                        <span class="checkmark"></span>
                        Remember Me
                    </label>
                </div>

                <div id="login-error" class="error-msg" style="display:none;">
                    ⚠ Invalid credentials. Please try again.
                </div>

                <button type="submit" class="primary-btn w-full" id="login-btn">
                    <span class="btn-text">Access Platform</span>
                    <div class="btn-loader" id="btn-loader">
                        <div class="spinner-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </button>
            </form>

            <div class="test-creds">
                <span class="creds-label">Test Credentials</span>
                <code>admin@deepmorph.com / admin123</code>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
